# ──────────────────────────────────────────────────────────
# TLP — Balanced daily driver profile for i5-1035G1
# Keeps temps low for work sessions; switch to game-performance script when needed
# ──────────────────────────────────────────────────────────

# CPU governor — pin AC to performance, keep battery adaptive
CPU_SCALING_GOVERNOR_ON_AC=performance
CPU_SCALING_GOVERNOR_ON_BAT=schedutil

# Energy/performance policy — maximize responsiveness on AC, save power on battery
CPU_ENERGY_PERF_POLICY_ON_AC=performance
CPU_ENERGY_PERF_POLICY_ON_BAT=power

# Performance caps — full headroom on AC, balanced cap on battery
CPU_MAX_PERF_ON_AC=100
CPU_MAX_PERF_ON_BAT=60
CPU_MIN_PERF_ON_AC=5
CPU_MIN_PERF_ON_BAT=5

# Turbo boost on AC for responsiveness; keep disabled on battery
CPU_BOOST_ON_AC=1
CPU_BOOST_ON_BAT=0
CPU_HWP_DYN_BOOST_ON_AC=0
CPU_HWP_DYN_BOOST_ON_BAT=0

# WiFi power saving enabled even on AC to trim idle watts
WIFI_PWR_ON_AC=on
WIFI_PWR_ON_BAT=on

# PCIe ASPM — enable powersave states to drop idle watts (supersave on battery)
PCIE_ASPM_ON_AC=powersave
PCIE_ASPM_ON_BAT=powersupersave

# USB autosuspend
USB_AUTOSUSPEND=1

# SATA — performance on AC
SATA_LINKPWR_ON_AC=med_power_with_dipm
SATA_LINKPWR_ON_BAT=med_power_with_dipm
