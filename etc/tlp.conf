# ──────────────────────────────────────────────────────────
# TLP — Performance-first for i5-1035G1
# "Fast and responsive, don't care if it runs hot"
# ──────────────────────────────────────────────────────────

# CPU governor — performance on AC, schedutil on battery for responsiveness
CPU_SCALING_GOVERNOR_ON_AC=performance
CPU_SCALING_GOVERNOR_ON_BAT=schedutil

# Energy/performance policy — full speed on AC, balanced on battery
CPU_ENERGY_PERF_POLICY_ON_AC=performance
CPU_ENERGY_PERF_POLICY_ON_BAT=balance_performance

# NO performance caps — let the CPU use its full range
CPU_MAX_PERF_ON_AC=100
CPU_MAX_PERF_ON_BAT=100
CPU_MIN_PERF_ON_AC=10
CPU_MIN_PERF_ON_BAT=10

# Turbo boost ON always — max single-thread speed
CPU_BOOST_ON_AC=1
CPU_BOOST_ON_BAT=1
CPU_HWP_DYN_BOOST_ON_AC=1
CPU_HWP_DYN_BOOST_ON_BAT=1

# WiFi power saving OFF on AC (reduces latency)
WIFI_PWR_ON_AC=off
WIFI_PWR_ON_BAT=on

# PCIe — performance on AC, power save on battery only
PCIE_ASPM_ON_AC=default
PCIE_ASPM_ON_BAT=powersupersave

# USB autosuspend
USB_AUTOSUSPEND=1

# SATA — performance on AC
SATA_LINKPWR_ON_AC=max_performance
SATA_LINKPWR_ON_BAT=med_power_with_dipm
