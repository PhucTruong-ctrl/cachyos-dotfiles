# User Settings
# This is where you put your own settings as this will not be touched during update 
# if the upgrade.sh is used.

# refer to Hyprland wiki for more info https://wiki.hyprland.org/Configuring/Variables/
# NOTE: some settings are in ~/.config/hypr/UserConfigs/UserDecorAnimations.conf
#
# Look on ~/.config/hypr/configs/SystemSettings.conf to know how to modify this

# ── NVIDIA MX330 optimizations ──

# Enable hardware cursors (software cursors in SystemSettings add CPU overhead)
# ⚠️ ESCAPE HATCH: If cursor disappears/flickers after reload:
#   1. Press Ctrl+Alt+F2 (switch to TTY2)
#   2. Run: hyprctl keyword cursor:no_hardware_cursors 1
#   3. Press Ctrl+Alt+F1 (switch back)
#   4. Comment out this block and hyprctl reload
cursor {
  no_hardware_cursors = 0
}

# NOTE: render:explicit_sync does NOT exist in Hyprland 0.53.x
# Tearing prevention is handled automatically by the compositor.

# NVIDIA anti-flicker (already exists commented in SystemSettings.conf:103-105)
opengl {
  nvidia_anti_flicker = true
}
