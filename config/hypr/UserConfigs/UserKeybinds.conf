# /* ---- 💫 https://github.com/JaKooLit 💫 ---- */  #
# This is where you put your own keybinds. Be Mindful to check as well ~/.config/hypr/configs/Keybinds.conf to avoid conflict
# if you think I should replace the Pre-defined Keybinds in ~/.config/hypr/configs/Keybinds.conf , submit an issue or let me know in DC and present me a valid reason as to why, such as conflicting with global shortcuts, etc etc

# See https://wiki.hyprland.org/Configuring/Keywords/ for more settings and variables
# See also Laptops.conf for laptops keybinds 

# /* ---- ✴️ Variables ✴️ ---- */  #
$mainMod = SUPER
$scriptsDir = $HOME/.config/hypr/scripts
$UserScripts = $HOME/.config/hypr/UserScripts
$UserConfigs = $HOME/.config/hypr/UserConfigs

# ── Scratchpad toggles ──
bindd = $mainMod, F1, toggle system monitor, togglespecialworkspace, btop
bindd = $mainMod, F2, toggle quick terminal, togglespecialworkspace, term
bindd = $mainMod, F3, toggle music player, togglespecialworkspace, music

# ── App launches (only for apps without existing keybinds) ──
# NOTE: Browser already has $mainMod, B (Keybinds.conf:18)
# NOTE: File manager already has $mainMod, E (Keybinds.conf:23)
bindd = $mainMod SHIFT, C, launch VS Code, exec, code
bindd = $mainMod SHIFT, D, launch Discord, exec, discord

# ── Window management ──
# Center floating window
bindd = $mainMod, C, center window, centerwindow, 1
# Pin window (always on top, visible on all workspaces)
bindd = $mainMod ALT, P, pin window on top, pin

# For passthrough keyboard into a VM
# bind = $mainMod ALT, P, submap, passthru
#submap = passthru
# to unbind
#bind = $mainMod ALT, P, submap, reset
#submap = reset
