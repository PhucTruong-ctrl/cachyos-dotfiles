# /* ---- 💫 https://github.com/JaKooLit 💫 ---- */  #
# For window rules and layerrules
# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more

# This file is used to add or overwrite window rules 
# This file will not be modified during dotfiles updates

# /* ---- Dotfiles Overhaul ---- */
# Workspace assignments using JaKooLit's existing tag system
# Tags defined in configs/WindowRules.conf: +browser, +projects, +im, +terminal, +file-manager, +multimedia

# ── Missing app tags (not in vendor defaults) ──
windowrule = match:class ^(com.mitchellh.ghostty|ghostty)$, tag +terminal
windowrule = match:class ^(Cursor|cursor)$, tag +projects
windowrule = match:class ^(Spotify|spotify)$, tag +multimedia
windowrule = match:class ^(obsidian)$, tag +multimedia

# ── Workspace assignments ──
# WS1: Terminal (ghostty, kitty, alacritty)
windowrule = match:tag terminal, workspace 1
# WS2: Browser (firefox, chrome, brave, zen, etc.)
windowrule = match:tag browser, workspace 2
# WS3: Code (vscode, cursor, codium, jetbrains, zed)
windowrule = match:tag projects, workspace 3
# WS4: Communication (discord, telegram, whatsapp, etc.)
windowrule = match:tag im, workspace 4
# WS5: Media & Misc (spotify, obsidian, thunar, multimedia)
windowrule = match:tag multimedia, workspace 5
windowrule = match:tag file-manager, workspace 5
windowrule = match:class ^(notion-app|Notion)$, workspace 5
