# ┃                   Hyprlock Configuration                    ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛
# GPU-accelerated screen lock for Hyprland.
# Docs: https://wiki.hypr.land/Hypr-Ecosystem/hyprlock/
#
# Design: Material You — blurred screenshot background, matugen dynamic colors.
# Colors sourced from ~/.cache/matugen/hyprlock-colors.conf (written by
# hyprlock-colors.sh on every wallpaper change; never hardcoded here).

# ── Dynamic Color Variables ───────────────────────────────────────────────────
# Generated by config/quickshell/scripts/hyprlock-colors.sh
source = ~/.cache/matugen/hyprlock-colors.conf

# ── General ──────────────────────────────────────────────────────────────────
general {
    # No grace period — password required immediately on lock
    grace               = 0

    # Disable the loading bar progress indicator for a cleaner look
    disable_loading_bar = true

    # Keep cursor hidden while locked
    hide_cursor         = true

    # Smooth fade-in/out animation
    no_fade_in          = false
    no_fade_out         = false

    # Ignore empty password submissions to avoid failed-attempt flicker
    ignore_empty_input  = true
}

# ── Background ───────────────────────────────────────────────────────────────
background {
    monitor     =
    # Blurred screenshot — Material You ambiance
    path        = screenshot
    blur_passes = 3
    blur_size   = 8
    brightness  = 0.75
}

# ── Greeting Label ────────────────────────────────────────────────────────────
label {
    monitor     =
    text        = Hello, Phuc
    color       = $lock_fg
    font_size   = 18
    font_family = Fira Sans

    # Just above the clock
    position    = 0, 280
    halign      = center
    valign      = center
}

# ── Clock Label ──────────────────────────────────────────────────────────────
label {
    monitor     =
    text        = cmd[update:1000] echo "<b>$(date +'%H:%M')</b>"
    color       = $lock_fg
    font_size   = 88
    font_family = Fira Sans Bold

    # Centered, upper-center area
    position    = 0, 160
    halign      = center
    valign      = center
}

# ── Date Label ───────────────────────────────────────────────────────────────
label {
    monitor     =
    text        = cmd[update:60000] echo "$(date +'%A, %B %d')"
    color       = $lock_fg
    font_size   = 20
    font_family = Fira Sans

    # Just below clock
    position    = 0, 80
    halign      = center
    valign      = center
}

# ── Password Input Field ──────────────────────────────────────────────────────
input-field {
    monitor     =

    # Dimensions — comfortable touch-friendly width
    size        = 300, 52

    # Rounded pill shape — Material 3 aesthetic
    outline_thickness = 2
    rounding          = 26

    # Colors from matugen palette
    outer_color   = $lock_accent
    inner_color   = rgba(0, 0, 0, 0.45)
    font_color    = $lock_fg

    # Feedback colors
    check_color   = $lock_accent
    fail_color    = $lock_error

    font_family   = Fira Sans

    # Descriptive placeholder
    placeholder_text = <i>Enter Password...</i>

    # Dot-style password masking
    dots_size     = 0.28
    dots_spacing  = 0.4
    dots_center   = true

    # Show dots, not raw characters
    hide_input    = false

    # Clear the field after a short delay on failure
    fail_timeout      = 2000
    fail_transition   = 300

    # Fade the field out when empty and unfocused
    fade_on_empty     = true

    # Lower-center of the screen
    position    = 0, -80
    halign      = center
    valign      = center
}
