# ┃                   Hyprlock Configuration                    ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛
# GPU-accelerated screen lock for Hyprland.
# Docs: https://wiki.hypr.land/Hypr-Ecosystem/hyprlock/
#
# Design: Minimalistic dark overlay with a centered password prompt.
# No external image assets required — uses a solid color background.

# ── General ──────────────────────────────────────────────────────────────────
general {
    # No grace period — password required immediately on lock
    grace             = 0

    # Disable the loading bar progress indicator for a cleaner look
    disable_loading_bar = true

    # Keep cursor hidden while locked
    hide_cursor       = true

    # Smooth fade-in animation
    no_fade_in        = false
    no_fade_out       = false

    # Ignore empty password submissions to avoid failed-attempt flicker
    ignore_empty_input = true
}

# ── Background ───────────────────────────────────────────────────────────────
# Applies to all monitors (monitor = empty string means all).
# Uses a solid dark color — no external wallpaper dependency.
background {
    monitor    =
    # Solid near-black background matching the Hyprland misc.background_color
    color      = rgba(25, 25, 25, 1.0)

    # Optional: uncomment to use the system wallpaper with blur instead
    # path     = screenshot
    # blur_passes = 3
    # blur_size   = 7
    # brightness  = 0.6
}

# ── Clock Label ──────────────────────────────────────────────────────────────
label {
    monitor    =
    text       = cmd[update:1000] echo "<b>$(date +'%H:%M')</b>"
    color      = rgba(221, 221, 221, 0.9)
    font_size  = 72
    font_family = Fira Sans

    # Centered horizontally, positioned in the upper third of the screen
    position   = 0, 120
    halign     = center
    valign     = center
}

# ── Date Label ───────────────────────────────────────────────────────────────
label {
    monitor    =
    text       = cmd[update:60000] echo "$(date +'%A, %B %d')"
    color      = rgba(187, 187, 187, 0.7)
    font_size  = 20
    font_family = Fira Sans

    position   = 0, 40
    halign     = center
    valign     = center
}

# ── Password Input Field ──────────────────────────────────────────────────────
input-field {
    monitor    =

    # Dimensions
    size       = 280, 50

    # Visual style — rounded rectangle with a subtle accent border
    outline_thickness = 2
    rounding          = 6

    # Colors — dark inner, CachyOS-green accent on focus/check
    outer_color  = rgba(130, 220, 204, 0.6)   # cachylgreen muted
    inner_color  = rgba(17, 24, 38, 0.85)     # cachydblue semi-transparent
    font_color   = rgba(221, 221, 221, 1.0)

    # Feedback colors
    check_color  = rgba(130, 220, 204, 1.0)   # cachylgreen — correct password
    fail_color   = rgba(220, 80, 80, 1.0)     # red — wrong password

    font_family  = Fira Sans

    # Placeholder text shown before typing
    placeholder_text = <i>Password...</i>

    # Dot-style password masking
    dots_size    = 0.28
    dots_spacing = 0.4
    dots_center  = true

    # Hide input characters (show dots instead)
    hide_input   = false

    # Clear the field after a short delay on failure
    fail_timeout      = 2000
    fail_transition   = 300

    # Fade the field out when empty and unfocused
    fade_on_empty     = true

    # Positioned in the lower-center of the screen
    position   = 0, -100
    halign     = center
    valign     = center
}
