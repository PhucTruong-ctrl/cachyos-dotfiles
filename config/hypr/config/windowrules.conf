# ┃                    Windowrules Configuration                ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛

# Hyprland 0.53+ Window Rules - Simplified for 0.53.3
# https://wiki.hypr.land/0.53.0/Configuring/Window-Rules/

# Float dialogs and utilities
windowrule = match:class pavucontrol, float on
windowrule = match:title Picture.*in.*picture, float on
windowrule = match:title Save File, float on
windowrule = match:title Open File, float on
windowrule = match:class blueman-manager, float on
windowrule = match:class zenity, float on
windowrule = match:title Steam.*Self.*Updater, float on
windowrule = match:class CachyOSHello, float on

# Opacity rules
windowrule = match:class thunar, opacity 0.92
windowrule = match:class nemo, opacity 0.92
windowrule = match:class discord, opacity 0.96
windowrule = match:class armcord, opacity 0.96
windowrule = match:class webcord, opacity 0.96

# Animation for terminal
windowrule = match:class kitty, animation slide right
windowrule = match:class Alacritty, animation slide right
windowrule = match:class ghostty, animation slide right

# Workspace rules with smart gaps
workspace = w[tv1-10], gapsout:5, gapsin:3
workspace = f[1], gapsout:5, gapsin:3
