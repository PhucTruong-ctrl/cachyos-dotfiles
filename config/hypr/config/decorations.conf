# ┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓
# ┃                    Decorations Configuration                ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛

source = ~/.config/hypr/config/colors.conf

# https://wiki.hyprland.org/Configuring/Variables/#decoration

decoration {
    active_opacity = 1
    rounding = 4

    # https://wiki.hyprland.org/Configuring/Variables/#blur
    blur {
        size = 15
        passes = 2 # more passes = more resource intensive.
        xray = true
    }

    # https://wiki.hyprland.org/Configuring/Variables/#shadow
    shadow {
        enabled = false
    }
}

# ── Layer rules for Quickshell panels (frosted glass) ─────────────────────────
# Apply blur and alpha ignore to all Quickshell layer-shell surfaces.
# namespace strings match WlrLayershell.namespace values set in each .qml panel.
layerrule = blur, quickshell-launcher
layerrule = ignorealpha 0.5, quickshell-launcher
layerrule = blur, quickshell-power
layerrule = ignorealpha 0.5, quickshell-power
layerrule = blur, quickshell-control-center
layerrule = ignorealpha 0.5, quickshell-control-center
layerrule = blur, quickshell-notifs
layerrule = ignorealpha 0.5, quickshell-notifs
layerrule = blur, quickshell-calendar
layerrule = ignorealpha 0.5, quickshell-calendar
layerrule = blur, quickshell-theme
layerrule = ignorealpha 0.5, quickshell-theme
layerrule = blur, quickshell-dashboard
layerrule = ignorealpha 0.5, quickshell-dashboard
layerrule = blur, quickshell-osd
layerrule = ignorealpha 0.5, quickshell-osd
