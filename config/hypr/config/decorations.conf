# ┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓
# ┃                    Decorations Configuration                ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛

source = ~/.config/hypr/config/colors.conf

# https://wiki.hyprland.org/Configuring/Variables/#decoration

decoration {
    active_opacity = 1
    rounding = 4

    # https://wiki.hyprland.org/Configuring/Variables/#blur
    blur {
        size = 15
        passes = 2 # more passes = more resource intensive.
        xray = true
    }

    # https://wiki.hyprland.org/Configuring/Variables/#shadow
    shadow {
        enabled = false
    }
}

# ── Layer rules for Quickshell panels (frosted glass) ─────────────────────────
# Apply blur and alpha ignore to all Quickshell layer-shell surfaces.
# namespace strings match WlrLayershell.namespace values set in each .qml panel.
# Syntax: Hyprland 0.53+ (match:namespace, blur on, ignore_alpha)
layerrule = blur on, match:namespace quickshell-launcher
layerrule = ignore_alpha 0.5, match:namespace quickshell-launcher
layerrule = blur on, match:namespace quickshell-power
layerrule = ignore_alpha 0.5, match:namespace quickshell-power
layerrule = blur on, match:namespace quickshell-control-center
layerrule = ignore_alpha 0.5, match:namespace quickshell-control-center
layerrule = blur on, match:namespace quickshell-notifs
layerrule = ignore_alpha 0.5, match:namespace quickshell-notifs
layerrule = blur on, match:namespace quickshell-notifications
layerrule = ignore_alpha 0.5, match:namespace quickshell-notifications
layerrule = blur on, match:namespace quickshell-calendar
layerrule = ignore_alpha 0.5, match:namespace quickshell-calendar
layerrule = blur on, match:namespace quickshell-theme
layerrule = ignore_alpha 0.5, match:namespace quickshell-theme
layerrule = blur on, match:namespace quickshell-dashboard
layerrule = ignore_alpha 0.5, match:namespace quickshell-dashboard
layerrule = blur on, match:namespace quickshell-osd
layerrule = ignore_alpha 0.5, match:namespace quickshell-osd
layerrule = blur on, match:namespace quickshell-screenshot
layerrule = ignore_alpha 0.5, match:namespace quickshell-screenshot
