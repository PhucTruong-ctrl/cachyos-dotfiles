# ┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓
# ┃                    Autostart Configuration                  ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛

source = ~/.config/hypr/config/defaults.conf

# Autostart wiki https://wiki.hyprland.org/Configuring/Keywords/#executing

exec-once = fcitx5 -d &
exec-once = hyprpolkitagent &

# ## Slow app launch fix
exec-once = systemctl --user import-environment &
exec-once = hash dbus-update-activation-environment 2>/dev/null &
exec-once = dbus-update-activation-environment --systemd &

# ## Idle configuration
exec-once = hypridle &

# ## Wallpaper daemon (swww — used by Quickshell wallpaper engine)
exec-once = swww-daemon &

# ## Quickshell UI shell (bar, notifications, launcher, power menu, control center, OSD)
exec-once = QT_LOGGING_RULES="quickshell.dbus.properties.warning=false;quickshell.service.notifications.warning=false;qt.svg.warning=false" quickshell -p ~/.config/quickshell/shell.qml &

# ## Clipboard history daemon (cliphist — stores entries for Quickshell launcher)
exec-once = wl-paste --watch cliphist store &

# Personal Custom Tweaks
exec-once = tailscale up
