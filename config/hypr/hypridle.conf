# ┃                   Hypridle Configuration                    ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛
# Hyprland's idle management daemon.
# Docs: https://wiki.hypr.land/Hypr-Ecosystem/hypridle/

general {
    # Trigger Quickshell lock screen when a DBUS lock event is received
    # (e.g. from loginctl, or Power Menu "Lock" button).
    # hyprlock kept as fallback in case quickshell is not running.
    lock_cmd          = qs ipc call toggle-lockscreen lock || pidof hyprlock || hyprlock

    # Lock the session before the system suspends so we wake to a locked screen
    before_sleep_cmd  = qs ipc call toggle-lockscreen lock

    # Re-enable DPMS after waking from sleep
    after_sleep_cmd   = hyprctl dispatch dpms on
}

# ── Listener 1: Dim the screen after 2.5 minutes of inactivity ──────────────
listener {
    timeout    = 150  # 2.5 minutes (150 seconds)

    # Gradually dim to 20% brightness using brightnessctl (if available)
    on-timeout = brightnessctl -s set 20%

    # Restore original brightness when activity resumes
    on-resume  = brightnessctl -r
}

# ── Listener 2: Lock the session after 5 minutes of inactivity ──────────────
listener {
    timeout    = 300  # 5 minutes (300 seconds)

    # Lock using the Quickshell lock screen
    on-timeout = qs ipc call toggle-lockscreen lock
}

# ── Listener 3: Suspend the system after 15 minutes of inactivity ───────────
listener {
    timeout    = 900  # 15 minutes (900 seconds)

    on-timeout = systemctl suspend
}
