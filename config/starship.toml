# End-4 inspired fallback prompt for when Matugen cache isn't available.
# Dynamic prompt is generated at ~/.cache/matugen/starship.toml by matugen-sync.sh.

add_newline = false
palette = "fallback"

format = """
$cmd_duration у°ңҘ $directory $git_branch\
$character"""

[character]
success_symbol = "[  о©ұ пҒӢ](bold fg:blue)"
error_symbol = "[  пҖҚ пҒӢ](bold fg:red)"

[package]
disabled = true

[git_branch]
style = "bg: cyan"
symbol = "у°ҳ¬"
truncation_length = 12
truncation_symbol = ""
format = "у°ңҘ [оӮ¶](bold fg:cyan)[$symbol $branch(:$remote_branch)](fg:black bg:cyan)[оӮҙ ](bold fg:cyan)"

[git_status]
conflicted = " рҹҸі "
ahead = " рҹҸҺрҹ’Ё "
behind = " рҹҳ° "
diverged = " рҹҳө "
untracked = " рҹӨ· вҖҚ"
stashed = " рҹ“Ұ "
modified = " рҹ“қ "
staged = '[++($count)](green)'
renamed = " вңҚпёҸ "
deleted = " рҹ—‘ "

[hostname]
ssh_only = false
format =  "[вҖў$hostname](bg:cyan bold fg:black)[оӮҙ](bold fg:cyan)"
disabled = false

[line_break]
disabled = false

[username]
style_user = "bold bg:cyan fg:black"
style_root = "red bold"
format = "[оӮ¶](bold fg:cyan)[$user]($style)"
disabled = false
show_always = true

[directory]
home_symbol = " п‘ӯ "
read_only = " п‘– "
style = "bg:green fg:black"
truncation_length = 6
truncation_symbol = " вҖўвҖў/"
format = '[оӮ¶](bold fg:green)[у°үӢ $path]($style)[оӮҙ](bold fg:green)'

[directory.substitutions]
"Desktop" = " п’© "
"Documents" = " п’Ҙ "
"Downloads" = " пҗү "
"Music" = " у°ҺҲ "
"Pictures" = " пҗҸ "
"Videos" = " п”¬ "
"GitHub" = " у°ҠӨ "

[cmd_duration]
min_time = 0
format = '[оӮ¶](bold fg:yellow)[у°Әў $duration](bold bg:yellow fg:black)[оӮҙ](bold fg:yellow)'

[palettes.fallback]
blue = "#89b4fa"
red = "#f38ba8"
